# frontend/nginx.conf
# ─────────────────────────────────────────────────────────────────
#  Nginx configuration for the ConvertFlow frontend container.
#
#  Responsibilities:
#    1. Serve the React SPA from /usr/share/nginx/html
#    2. Proxy /auth/* and /files/* and /health to the FastAPI backend
#    3. Handle SPA routing — 404s fall back to index.html
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # ── Static files (React build output) ────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that doesn't match a real file returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend ─────────────────────────────────────
    # The backend service is named "backend" in docker-compose.yml,
    # so Docker's internal DNS resolves it on port 8000.
    location /auth/ {
        proxy_pass         http://backend:8000/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        # Required for file downloads
        proxy_buffering    off;
    }

    location /files {
        proxy_pass         http://backend:8000/files;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;      # Long timeout for large file conversions
        # Disable response buffering so downloads stream properly
        proxy_buffering    off;
        # Increase body size limit to match the backend's 50 MB cap
        client_max_body_size 52m;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_set_header   Host $host;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;
}
