<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Deep navy background to match app shell -->
  <rect width="32" height="32" rx="8" fill="#060b14"/>

  <!-- Glassy inner card -->
  <rect x="4" y="4" width="24" height="24" rx="6" fill="#0d1520"/>
  <rect x="4.5" y="4.5" width="23" height="23" rx="5.5" stroke="url(#border)" stroke-width="0.8"/>

  <!-- Cyan conversion "flow" glyph -->
  <path
    d="M11 11h6.5c1.1 0 2 .9 2 2v1.2M21 21h-6.5c-1.1 0-2-.9-2-2v-1.2"
    stroke="#22d3ee"
    stroke-width="1.6"
    stroke-linecap="round"
  />
  <path
    d="M18.7 13.3L20.8 14.5 22 12.4"
    stroke="#22d3ee"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M13.3 18.7L11.2 17.5 10 19.6"
    stroke="#67e8f9"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Subtle highlight in top left -->
  <circle cx="10" cy="9" r="2" fill="#22d3ee" fill-opacity="0.35"/>

  <defs>
    <linearGradient id="border" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
